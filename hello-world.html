<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <script src="sdk/scripts/VSS.SDK.min.js"></script>
        <script src="scripts/widget.js"></script>
        <script type="text/javascript">
            VSS.init({
                explicitNotifyLoaded: true,
                usePlatformStyles: true
            });

            VSS.require(["TFS/Dashboards/WidgetHelpers", "TFS/WorkItemTracking/RestClient"],
                function (WidgetHelpers, WorkItemRestClient) {
                    WidgetHelpers.IncludeWidgetStyles();

                    VSS.register("AccessEpicsWidget", {
                        load: function (widgetSettings) {
                            // widgetSettings trae el estado guardado desde configuration.html
                            return cargarWidget(widgetSettings, WidgetHelpers, WorkItemRestClient);
                        },
                        reload: function (widgetSettings) {
                            // se dispara al guardar cambios en el menú de configuración
                            $(".content").empty();
                            $(".porcentaje").empty();
                            return cargarWidget(widgetSettings, WidgetHelpers, WorkItemRestClient);
                        }
                    });

                    VSS.notifyLoadSucceeded();
                }
            );
        </script>
    </head>
    <body>
        <div class="widget">
            <h2 class="title"></h2>
            <p class="porcentaje"></p>
            <div class="content"></div>
        </div>
    </body>
</html>
